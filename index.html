<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Guess - Gamedle Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --text-color: #ffffff;
            --font-pixel: 'Press Start 2P', cursive;
            --gamedle-orange: #ff8c00;
        }

        body {
            font-family: var(--font-pixel);
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* FONDO COLLAGE */
        .background-collage {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            opacity: 0.15;
        }
        .background-collage img { width: 100%; height: 200px; object-fit: cover; border: 1px solid #111; }

        .gradient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 75%, rgba(0,0,0,1) 100%);
        }

        .container { width: 100%; max-width: 450px; text-align: center; z-index: 10; }

        .header-title {
            color: var(--gamedle-orange);
            font-size: 22px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px #000;
        }

        /* ZOOM AREA */
        .image-outer-wrapper {
            position: relative;
            width: 260px;
            height: 360px;
            margin: 0 auto 20px;
            cursor: crosshair;
            border: 4px solid #fff;
        }

        #main-img-container { width: 100%; height: 100%; background: #222; overflow: hidden; }

        #anime-img { 
            width: 100%; height: 100%; object-fit: cover; 
            image-rendering: pixelated; 
        }

        .zoom-lens {
            position: absolute;
            width: 100px; height: 100px;
            border: 2px solid white;
            border-radius: 50%;
            display: none;
            pointer-events: none;
            background-repeat: no-repeat;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* INTERFAZ */
        .autocomplete-wrapper { position: relative; width: 90%; margin: 0 auto 15px; }
        input {
            width: 100%; padding: 12px; font-family: Arial; font-size: 16px;
            border: none; outline: none; border-radius: 4px;
        }

        .button-group { display: flex; justify-content: center; gap: 10px; }
        .btn {
            font-family: var(--font-pixel); font-size: 10px; padding: 15px 20px;
            border: 3px solid #000; border-radius: 4px; cursor: pointer; color: white;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3);
        }
        .btn-omit { background: linear-gradient(to bottom, #ff8c00, #e65c00); }
        .btn-guess { background: linear-gradient(to bottom, #0099ff, #0066cc); flex-grow: 0.5; }

        .hearts { color: #ff4757; font-size: 20px; margin: 15px 0 5px; }
        .info-text { font-size: 8px; color: #888; }

        .autocomplete-items {
            position: absolute; background: white; color: black;
            width: 100%; z-index: 1000; text-align: left; font-family: Arial;
            max-height: 150px; overflow-y: auto;
        }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="background-collage" id="bg-collage"></div>
    <div class="gradient-overlay"></div>

    <div class="container">
        <h1 class="header-title">ANIME GUESS</h1>
        <div id="message" style="font-size: 10px; height: 15px; margin-bottom: 10px;"></div>
        
        <div class="image-outer-wrapper" id="zoom-area">
            <div class="zoom-lens" id="zoom-lens"></div>
            <div id="main-img-container">
                <img id="anime-img" src="" alt="Cargando...">
            </div>
        </div>

        <div class="autocomplete-wrapper">
            <input id="myInput" type="text" placeholder="BUSCAR ANIME..." autocomplete="off">
            <div id="autocomplete-list" class="autocomplete-items"></div>
        </div>

        <div class="button-group">
            <button class="btn btn-omit" onclick="nextLevel()">OMITIR</button>
            <button class="btn btn-guess" onclick="checkGuess()">ADIVINAR</button>
        </div>

        <div class="lives-container">
            <div class="hearts" id="hearts-display">❤️❤️❤️❤️❤️❤️</div>
            <p class="info-text" id="status-text">6 VIDAS RESTANTES</p>
        </div>
    </div>

    <script>
        // Base de datos con enlaces directos de alta disponibilidad
        const animes = [
            { name: "Dragon Ball Z", img: "https://files.catbox.moe/p94atp.jpg" },
            { name: "Naruto", img: "https://files.catbox.moe/u6l252.jpg" },
            { name: "One Piece", img: "https://files.catbox.moe/j0g5sh.jpg" },
            { name: "Akira", img: "https://files.catbox.moe/u8uuzq.jpg" },
            { name: "Sailor Moon", img: "https://files.catbox.moe/110p4a.jpg" },
            { name: "Evangelion", img: "https://files.catbox.moe/2s9o1c.jpg" }
        ];

        let currentAnime;
        let lives = 6;
        let gameOver = false;

        const input = document.getElementById("myInput");
        const listContainer = document.getElementById("autocomplete-list");
        const animeImg = document.getElementById("anime-img");
        const lens = document.getElementById("zoom-lens");
        const zoomArea = document.getElementById("zoom-area");

        // Crear Fondo
        function createBackground() {
            const bg = document.getElementById("bg-collage");
            for(let i=0; i<40; i++) {
                const img = document.createElement("img");
                img.src = animes[i % animes.length].img;
                bg.appendChild(img);
            }
        }

        // Lógica de Vidas
        function updateHearts() {
            document.getElementById("hearts-display").innerText = "❤️".repeat(lives) + "🖤".repeat(6-lives);
            document.getElementById("status-text").innerText = `${lives} VIDAS RESTANTES`;
            if(lives <= 0) endGame("HAS PERDIDO");
        }

        function endGame(msg) {
            gameOver = true;
            document.getElementById("message").innerText = msg;
            animeImg.style.imageRendering = "auto";
            lens.style.display = "none";
        }

        // Siguiente Nivel
        function nextLevel() {
            lives = 6;
            gameOver = false;
            updateHearts();
            currentAnime = animes[Math.floor(Math.random() * animes.length)];
            animeImg.src = currentAnime.img;
            animeImg.style.imageRendering = "pixelated";
            input.value = "";
            document.getElementById("message").innerText = "";
            listContainer.innerHTML = "";
        }

        // Zoom funcional
        zoomArea.addEventListener("mousemove", (e) => {
            if(gameOver) return;
            lens.style.display = "block";
            const rect = zoomArea.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            // Posicionar lente
            lens.style.left = (x - 50) + "px";
            lens.style.top = (y - 50) + "px";

            // Zoom background
            lens.style.backgroundImage = `url(${currentAnime.img})`;
            lens.style.backgroundSize = (rect.width * 2) + "px " + (rect.height * 2) + "px";
            lens.style.backgroundPosition = `-${(x * 2) - 50}px -${(y * 2) - 50}px`;
        });

        zoomArea.addEventListener("mouseleave", () => lens.style.display = "none");

        // Autocompletado
        input.addEventListener("input", function() {
            const val = this.value;
            listContainer.innerHTML = "";
            if (!val) return;
            animes.filter(a => a.name.toLowerCase().includes(val.toLowerCase())).forEach(anime => {
                const div = document.createElement("div");
                div.innerText = anime.name;
                div.onclick = () => { input.value = anime.name; listContainer.innerHTML = ""; };
                listContainer.appendChild(div);
            });
        });

        function checkGuess() {
            if(gameOver) return;
            if(input.value.toLowerCase() === currentAnime.name.toLowerCase()) {
                endGame("¡CORRECTO!");
                document.getElementById("message").style.color = "#4cd137";
            } else {
                lives--;
                updateHearts();
                input.value = "";
                document.getElementById("message").innerText = "INCORRECTO";
                document.getElementById("message").style.color = "#ff4757";
            }
        }

        window.onload = () => { createBackground(); nextLevel(); };
    </script>
</body>
</html>
